services:
  - type: web
    name: crewbidiq
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: crewbidiq-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /var/data
      - key: LABS_ENABLED
        value: "true"
      - key: FLIGHT_DECK_PREVIEW_ENABLED
        value: "true"
      - key: SOUTHWEST_LINE_RANKER_ENABLED
        value: "true"
      - key: MAX_PARSE_SECONDS
        value: "600"
      - key: JOB_STALE_SECONDS
        value: "720"
      - key: PACKAGE_RETENTION_SECONDS
        value: "86400"
      - key: ANALYSIS_DEBUG_ENABLED
        value: "false"
