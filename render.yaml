services:
  - type: web
    name: crewbidiq
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: crewbidiq-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /var/data
      - key: LABS_ENABLED
        value: "true"
      - key: SOUTHWEST_LINE_RANKER_ENABLED
        value: "true"
